<!doctype html>
<html lang="de">
<head>

<title>Anime Apartment 3D</title>
<style>
html,body{margin:0;height:100%;overflow:hidden;background:#f7ecdf;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;color:#4d3b31}#app{position:fixed;inset:0}.ui{position:fixed;left:12px;top:12px;max-width:360px;padding:12px 14px;border-radius:18px;background:rgba(255,248,238,.72);border:1px solid rgba(110,85,65,.18);box-shadow:0 16px 60px rgba(80,55,35,.18);backdrop-filter:blur(14px);font-size:13px;line-height:1.4}.ui h1{margin:0 0 6px;font-size:17px}.ui.hidden{display:none}.mobile{position:fixed;left:50%;bottom:12px;transform:translateX(-50%);display:flex;gap:6px;max-width:96vw;overflow:auto;padding:8px;border-radius:18px;background:rgba(255,248,238,.72);border:1px solid rgba(110,85,65,.18);backdrop-filter:blur(14px)}button{border:0;border-radius:999px;background:#f3d2a8;color:#4d3b31;font-weight:800;padding:10px 12px;white-space:nowrap}.toast{position:fixed;right:12px;top:12px;max-width:300px;padding:12px 14px;border-radius:16px;background:rgba(54,42,35,.78);color:white;opacity:0;transition:.25s}.toast.show{opacity:1}.gate{position:fixed;inset:0;display:grid;place-items:center;background:linear-gradient(135deg,#f6dec5,#fff6ea);z-index:9}.card{width:min(92vw,460px);padding:24px;border-radius:24px;background:rgba(255,255,255,.7);box-shadow:0 20px 80px rgba(80,55,35,.22);text-align:center}.card input{width:80%;padding:12px;border-radius:12px;border:1px solid #d4b28d;margin:10px}@media(pointer:fine){.mobile{bottom:16px}.mobile button{padding:8px 10px}}@media(max-width:650px){.ui{font-size:12px;max-width:270px}.ui p:nth-of-type(1){display:none}.mobile{bottom:8px}.mobile button{padding:10px 11px}}
</style>
<script type="importmap">{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.js","three/addons/":"https://cdn.jsdelivr.net/npm/three@0.165.0/examples/jsm/"}}</script>
</head>
<body>
<div id="app"></div>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
const ENABLE_ACCESS_GATE=false, DEMO_CODE='apartment-demo';
const app=document.getElementById('app');
if(ENABLE_ACCESS_GATE){app.innerHTML='<div class="gate"><div class="card"><h1>Anime Apartment 3D</h1><p>Einfacher Demo-Zugriffsschutz, keine echte Hochsicherheit.</p><input id="pw" type="password" placeholder="Passwort"><br><button id="go">Öffnen</button></div></div>';document.getElementById('go').onclick=()=>{if(document.getElementById('pw').value===DEMO_CODE) boot();}}else boot();
function boot(){app.innerHTML='';const scene=new THREE.Scene();scene.background=new THREE.Color('#f7ecdf');scene.fog=new THREE.Fog('#f7ecdf',18,38);const camera=new THREE.PerspectiveCamera(48,innerWidth/innerHeight,.1,80);const renderer=new THREE.WebGLRenderer({antialias:true,powerPreference:'high-performance'});renderer.setPixelRatio(Math.min(devicePixelRatio||1,2));renderer.setSize(innerWidth,innerHeight);renderer.shadowMap.enabled=true;renderer.shadowMap.type=THREE.PCFSoftShadowMap;app.appendChild(renderer.domElement);const controls=new OrbitControls(camera,renderer.domElement);controls.enableDamping=true;controls.dampingFactor=.08;controls.enablePan=true;controls.minDistance=6;controls.maxDistance=23;controls.minPolarAngle=Math.PI*.18;controls.maxPolarAngle=Math.PI*.47;controls.target.set(5,.7,3);const mat=materials();const info=[];scene.add(apartment(mat,info));const lights=lightRig(scene);const presets={gesamt:[[11,10,13],[5,.7,3]],wohnen:[[10,6.4,6.8],[7.5,1,3.9]],schlafen:[[2.5,5.7,9.2],[2.7,1,6.6]],arbeit:[[10.8,5.8,1.8],[8.6,1,1.4]],bad:[[1.7,5.3,2.3],[1.9,.8,1.6]],balkon:[[11.5,6,8.8],[9.8,.8,6.6]]};function view(k){camera.position.fromArray(presets[k][0]);controls.target.fromArray(presets[k][1]);controls.update()}view('gesamt');let mode='tag';function light(){mode=mode==='tag'?'abend':mode==='abend'?'nacht':'tag';lights.set(mode);toast('Licht: '+mode)}ui(view,light,()=>view('gesamt'));addTouch(renderer.domElement,()=>view('gesamt'),(x,y)=>pick(x,y));const ray=new THREE.Raycaster(),pointer=new THREE.Vector2();function pick(x,y){const r=renderer.domElement.getBoundingClientRect();pointer.x=(x-r.left)/r.width*2-1;pointer.y=-(x-r.top)/r.height*2+1;ray.setFromCamera(pointer,camera);const hit=ray.intersectObjects(info,true)[0];if(hit)toast(hit.object.userData.info||hit.object.parent?.userData.info||'Gemütliches Detail der Anime-Wohnung.')}addEventListener('keydown',e=>{const m={'1':'gesamt','2':'wohnen','3':'schlafen','4':'arbeit','5':'bad','6':'balkon'};if(m[e.key])view(m[e.key]);if(e.key.toLowerCase()==='r')view('gesamt');if(e.key.toLowerCase()==='l')light();if(e.key.toLowerCase()==='h')document.querySelector('.ui').classList.toggle('hidden')});addEventListener('resize',resize);addEventListener('orientationchange',()=>setTimeout(resize,150));function resize(){camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setPixelRatio(Math.min(devicePixelRatio||1,2));renderer.setSize(innerWidth,innerHeight)}renderer.domElement.addEventListener('dblclick',()=>view('gesamt'));(function anim(){requestAnimationFrame(anim);controls.update();renderer.render(scene,camera)})()}
function materials(){const toon=c=>new THREE.MeshToonMaterial({color:c});return{floor:toon('#d8ad7f'),wall:toon('#fff3e4'),wood:toon('#c58d5d'),dark:toon('#75553f'),sofa:toon('#e5b9a9'),fabric:toon('#f3d2c0'),glass:new THREE.MeshPhysicalMaterial({color:'#dff5ff',transparent:true,opacity:.42,roughness:.08}),tile:toon('#eaf2ef'),metal:toon('#aaa39a'),plant:toon('#75a878'),paper:toon('#fff8d7'),lamp:toon('#ffd983'),black:toon('#25242b'),accent:toon('#9fb7e6')}}
function box(n,s,p,m,txt){const o=new THREE.Mesh(new THREE.BoxGeometry(...s),m);o.name=n;o.position.set(...p);o.castShadow=o.receiveShadow=true;if(txt)o.userData.info=txt;return o}function cyl(n,r,h,p,m){const o=new THREE.Mesh(new THREE.CylinderGeometry(r,r,h,24),m);o.name=n;o.position.set(...p);o.castShadow=o.receiveShadow=true;return o}function mark(g,t,arr){g.userData.info=t;g.traverse(o=>{if(o.isMesh){o.userData.info=t;arr.push(o)}});return g}
function apartment(m,i){const r=new THREE.Group();r.name='anime_apartment_66sqm';r.add(box('Boden 66 qm',[11,.12,7],[5.5,0,3.5],m.floor));r.add(box('Balkonboden',[3,.1,1.35],[9.1,0,7.78],m.floor));[['Nordwand',[11,1.9,.12],[5.5,.95,7]],['Südwand',[11,1.9,.12],[5.5,.95,0]],['Westwand',[.12,1.9,7],[0,.95,3.5]],['Ostwand',[.12,1.9,3.8],[11,.95,1.9]],['Schlafzimmerwand',[.12,1.8,3.6],[4.25,.9,5.2]],['Badwand',[3.8,1.8,.12],[1.9,.9,3.1]],['Flurwand',[.12,1.8,2.4],[4.25,.9,1.2]]].forEach(w=>r.add(box(w[0],w[1],w[2],m.wall)));[['Eingangstür',[1.1,.08,1.55],[2,.82,-.08]],['Schlafzimmertür',[.9,.08,1.45],[4.2,.75,4.1]],['Badtür',[.9,.08,1.45],[2.8,.75,3.05]]].forEach(d=>r.add(box(d[0],d[1],d[2],m.dark)));[['Wohnfenster',[2.6,.08,1.15],[9.25,1.12,7.06]],['Küchenfenster',[1.5,.08,1],[9.7,1.1,.02]],['Schlafzimmerfenster',[1.4,.08,1],[1.2,1.1,7.06]],['Arbeitsfenster',[1.8,.08,1],[10.95,1.1,1.2]]].forEach(w=>r.add(box(w[0],w[1],w[2],m.glass)));r.add(hall(m,i),living(m,i),kitchen(m,i),bed(m,i),bath(m,i),work(m,i),balcony(m,i),decor(m));return r}
function hall(m,i){const g=new THREE.Group();g.add(box('Schuhschrank',[1.1,.55,.35],[.9,.3,.8],m.wood));g.add(box('Garderobe',[.12,1.25,.08],[3.55,.7,.65],m.dark));g.add(box('Spiegel',[.08,1.05,.65],[.08,1.05,1.7],m.glass));g.add(box('Schlüsselablage',[.7,.08,.25],[.42,.85,2.35],m.wood));g.add(box('Flurteppich',[1.8,.03,.85],[2.1,.08,.75],m.fabric));return mark(g,'Flur mit Eingang, Schuhschrank, Garderobe, Spiegel und Schlüsselablage.',i)}
function living(m,i){const g=new THREE.Group();g.add(box('Sofa',[2.4,.65,.9],[7.2,.38,4.6],m.sofa));g.add(box('Sofarücken',[2.4,.95,.18],[7.2,.72,5],m.sofa));g.add(box('Couchtisch',[1.2,.22,.55],[7.2,.22,3.6],m.wood));g.add(box('TV Board',[1.9,.42,.35],[9.9,.28,4.2],m.dark));g.add(box('Fernseher',[1.55,.82,.08],[10.05,.92,4.2],m.black));g.add(box('Bücherregal',[.75,1.6,.35],[5.45,.85,5.85],m.wood));g.add(box('Wohnteppich',[3.1,.035,2],[7.45,.08,4],m.fabric));g.add(cyl('Stehlampe',.16,1.45,[5.9,.75,3.15],m.lamp));g.add(box('Anime Poster',[.08,.75,.5],[5.03,1.2,4.9],m.accent));g.add(box('Kissen',[.48,.18,.32],[6.5,.83,4.28],m.paper));g.add(box('Sofadecke',[1,.08,.55],[7.75,.78,4.25],m.fabric));return mark(g,'Wohnzimmer: heller gemütlicher Mittelpunkt mit Sofa, TV, Regal, Teppich und Anime-Poster.',i)}
function kitchen(m,i){const g=new THREE.Group();g.add(box('Küchenzeile',[3,.75,.55],[7.4,.42,.55],m.wood));g.add(box('Kühlschrank',[.72,1.65,.65],[5.6,.85,.55],m.paper));g.add(box('Herd',[.62,.12,.45],[7,.86,.52],m.black));g.add(box('Spüle',[.55,.12,.38],[7.85,.86,.52],m.metal));g.add(box('Hängeschrank',[2.4,.48,.35],[7.55,1.45,.2],m.wood));g.add(box('Frühstücksbar',[1.5,.2,.55],[8.85,.55,1.55],m.dark));g.add(cyl('Stuhl 1',.22,.7,[8.35,.35,2.1],m.wood));g.add(cyl('Stuhl 2',.22,.7,[9.35,.35,2.1],m.wood));return mark(g,'Offene Küche mit Kühlschrank, Herd, Spüle, Arbeitsfläche, Hängeschränken und Frühstücksbar.',i)}
function bed(m,i){const g=new THREE.Group();g.add(box('Bett',[2.25,.48,1.45],[2.1,.32,5.85],m.wood));g.add(box('Matratze',[2.05,.25,1.25],[2.1,.68,5.85],m.paper));g.add(box('Bettdecke',[1.75,.18,.85],[2.25,.9,5.98],m.fabric));g.add(box('Kissen',[.65,.18,.35],[1.45,1.02,5.35],m.paper));g.add(box('Nachttisch',[.55,.48,.45],[3.7,.32,5.2],m.wood));g.add(box('Kleiderschrank',[1.1,1.7,.48],[.8,.9,4.25],m.dark));g.add(box('Kommode',[1,.7,.45],[3.45,.42,6.6],m.wood));g.add(box('Schlafteppich',[1.6,.03,1],[2.4,.08,4.75],m.fabric));return mark(g,'Privates Schlafzimmer mit Bett, Kleiderschrank, Kommode, warmem Licht und Fenster.',i)}
function bath(m,i){const g=new THREE.Group();g.add(box('Badfliesen',[3.7,.04,2.9],[1.85,.1,1.55],m.tile));g.add(box('Dusche Glas',[.95,1.35,.08],[.7,.8,2.45],m.glass));g.add(box('Duschtasse',[.95,.12,.95],[.7,.16,2.1],m.tile));g.add(box('Waschbecken',[.75,.28,.48],[2.4,.55,2.45],m.paper));g.add(box('Badspiegel',[.08,.75,.55],[2.98,1.15,2.45],m.glass));g.add(cyl('Toilette',.32,.5,[2.75,.32,.82],m.paper));g.add(box('Handtuchhalter',[.8,.08,.08],[1.1,1.1,.12],m.metal));return mark(g,'Kompaktes modernes Bad mit Dusche, Waschbecken, Spiegel, Toilette und hellen Fliesen.',i)}
function work(m,i){const g=new THREE.Group();g.add(box('Schreibtisch',[1.45,.22,.65],[9.25,.55,1.25],m.wood));g.add(cyl('Arbeitsstuhl',.28,.75,[8.65,.4,1.75],m.dark));g.add(box('Monitor',[.85,.52,.08],[9.25,1.05,.96],m.black));g.add(box('Tastatur',[.65,.05,.18],[9.25,.72,1.35],m.black));g.add(cyl('Schreibtischlampe',.12,.72,[10.05,.82,1.25],m.lamp));g.add(box('Notizbuch',[.45,.04,.32],[8.75,.72,1.18],m.paper));g.add(box('Pinnwand',[.08,.7,.9],[10.96,1.25,1.95],m.accent));return mark(g,'Arbeitsbereich am Fenster zum Schreiben, Programmieren, Lernen oder Zeichnen.',i)}
function balcony(m,i){const g=new THREE.Group();g.add(box('Balkongeländer vorn',[3,.75,.08],[9.1,.5,8.42],m.metal));g.add(box('Balkongeländer links',[.08,.75,1.35],[7.6,.5,7.78],m.metal));g.add(box('Balkontisch',[.7,.16,.7],[9.1,.45,7.75],m.wood));g.add(cyl('Balkonstuhl 1',.22,.65,[8.35,.35,7.85],m.wood));g.add(cyl('Balkonstuhl 2',.22,.65,[9.85,.35,7.85],m.wood));g.add(cyl('Pflanze Balkon',.2,.35,[10.25,.25,8.18],m.plant));g.add(box('Himmel Kulisse',[5,.08,1.8],[9.2,1.4,8.9],m.glass));return mark(g,'Kleiner Balkon mit Tisch, zwei Stühlen, Pflanzen, Geländer und weicher Himmelskulisse.',i)}
function decor(m){const g=new THREE.Group();for(let n=0;n<9;n++){g.add(cyl('Pflanze '+n,.12,.35,[1.2+n*.95,.25,6.75-(n%3)*2.15],m.plant));}for(let n=0;n<16;n++){g.add(box('dezente Outline '+n,[.02,.025,.6],[.5+n*.62,.12,.08],m.dark));}return g}
function lightRig(scene){const hemi=new THREE.HemisphereLight('#fff6df','#d8b890',1.6);scene.add(hemi);const sun=new THREE.DirectionalLight('#fff2cf',2.4);sun.position.set(5,8,6);sun.castShadow=true;sun.shadow.mapSize.set(1024,1024);scene.add(sun);const lamps=[];[[5.9,2.2,3.15],[3.7,1.7,5.2],[10.05,1.7,1.25],[2.2,1.8,1.6]].forEach(p=>{const l=new THREE.PointLight('#ffd28a',1.2,7);l.position.set(...p);scene.add(l);lamps.push(l)});return{set(mode){if(mode==='tag'){hemi.intensity=1.7;sun.intensity=2.4;scene.background.set('#f7ecdf');lamps.forEach(l=>l.intensity=.35)}if(mode==='abend'){hemi.intensity=.9;sun.intensity=1.1;scene.background.set('#f3c990');lamps.forEach(l=>l.intensity=1.5)}if(mode==='nacht'){hemi.intensity=.35;sun.intensity=.25;scene.background.set('#52627e');lamps.forEach(l=>l.intensity=2.0)}}}}
function ui(view,light,reset){const panel=document.createElement('div');panel.className='ui';panel.innerHTML='<h1>Anime Apartment 3D</h1><p>Maus: drehen · Rad: zoom · R: Reset · 1-6: Räume · L: Licht · H: Hinweise</p><p>Handy: ein Finger drehen, zwei Finger zoomen/verschieben, Doppeltipp Reset. Unten sind Raum-Buttons.</p>';document.body.appendChild(panel);const bar=document.createElement('div');bar.className='mobile';[['Gesamt','gesamt'],['Wohnen','wohnen'],['Schlafen','schlafen'],['Arbeit','arbeit'],['Bad','bad'],['Balkon','balkon']].forEach(([t,k])=>{const b=document.createElement('button');b.textContent=t;b.onclick=()=>view(k);bar.appendChild(b)});let b=document.createElement('button');b.textContent='Licht';b.onclick=light;bar.appendChild(b);b=document.createElement('button');b.textContent='Reset';b.onclick=reset;bar.appendChild(b);document.body.appendChild(bar)}
function toast(t){let el=document.querySelector('.toast');if(!el){el=document.createElement('div');el.className='toast';document.body.appendChild(el)}el.textContent=t;el.classList.add('show');clearTimeout(window.__toast);window.__toast=setTimeout(()=>el.classList.remove('show'),2300)}
function addTouch(el,reset,pick){let last=0,start=0;el.addEventListener('touchstart',e=>{start=Date.now();if(e.touches.length===1){const now=Date.now();if(now-last<320)reset();last=now;}},{passive:true});el.addEventListener('touchend',e=>{if(Date.now()-start>650&&e.changedTouches[0])pick(e.changedTouches[0].clientX,e.changedTouches[0].clientY)},{passive:true})}
</script>
